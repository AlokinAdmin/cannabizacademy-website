<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cannabiz Academy — Build a Cannabis Brand Without a License</title>
  <meta name="description" content="Cannabiz Academy teaches entrepreneurs how to build profitable cannabis brands without owning a license. Education, mentorship, and community." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    nav { padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; }
    nav .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
    nav .logo span { color: #22c55e; }
    .hero { min-height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px 24px; }
    .badge { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); padding: 6px 16px; border-radius: 100px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 32px; display: inline-block; }
    h1 { font-size: clamp(36px, 6vw, 72px); font-weight: 800; line-height: 1.05; letter-spacing: -2px; max-width: 800px; margin-bottom: 24px; }
    h1 span { color: #22c55e; }
    p.sub { font-size: 18px; color: #888; max-width: 520px; line-height: 1.6; margin-bottom: 48px; }
    .cta-group { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn-primary { background: #22c55e; color: #000; padding: 14px 32px; border-radius: 8px; font-weight: 700; font-size: 16px; text-decoration: none; }
    .btn-secondary { background: transparent; color: #fff; padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 16px; text-decoration: none; border: 1px solid #333; }
    footer { text-align: center; padding: 32px; color: #444; font-size: 14px; border-top: 1px solid #1a1a1a; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Cannabiz<span>Academy</span></div>
  </nav>
  <section class="hero">
    <span class="badge">Now Enrolling</span>
    <h1>Build a Cannabis Brand<br /><span>Without Owning a License</span></h1>
    <p class="sub">Learn how to build, scale, and profit in the cannabis industry — without the overhead, compliance burden, or capital required to hold a license.</p>
    <div class="cta-group">
      <a href="#" class="btn-primary">Apply Now</a>
      <a href="#" class="btn-secondary">Learn More</a>
    </div>
  </section>
  <footer>
    &copy; 2026 Cannabiz Academy. All rights reserved.
  </footer>
</body>
</html>
